name: Deploy CelestaCX Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Octavebytes logo
        run: |
          mkdir -p docs/assets
          curl -s -o docs/assets/logo.png \
            "https://octavebytes.com/wp-content/uploads/2023/10/Logo-Octavebytes-size-for-web.png" \
            || echo "Logo download attempted"

      - name: Install MkDocs and plugins
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean
